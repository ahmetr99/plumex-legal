<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plumex — Legal / Yasal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: #4fc3f7;
      margin-bottom: 6px;
    }
    .tagline {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 36px;
    }
    .label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 12px 0;
      padding: 16px 22px;
      background: #0a0a1a;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #1a1a3e; transform: translateY(-1px); }
    .btn .icon { font-size: 1.3rem; }
    .btn .arrow { color: #4fc3f7; font-size: 1rem; }
    .sub {
      font-size: 0.75rem;
      font-weight: 400;
      color: #888;
      margin-top: 2px;
      display: block;
      text-align: left;
    }
    .btn-text { text-align: left; }
    footer {
      margin-top: 32px;
      color: #bbb;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">PLUMEX</div>
    <div class="tagline">Mobile Game by Ahmet Rahmanog̃lu</div>

    <div class="label">Legal Documents / Yasal Belgeler</div>

    <a href="privacy.html" class="btn">
      <span class="icon">🔒</span>
      <span class="btn-text">
        Privacy Policy
        <span class="sub">Gizlilik Politikası</span>
      </span>
      <span class="arrow">›</span>
    </a>

    <a href="terms.html" class="btn">
      <span class="icon">📋</span>
      <span class="btn-text">
        Terms of Service
        <span class="sub">Kullanım Koşulları</span>
      </span>
      <span class="arrow">›</span>
    </a>

    <footer>© 2026 Plumex. All rights reserved.</footer>
  </div>
</body>
</html>
